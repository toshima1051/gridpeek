name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: gridpeek.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: gridpeek
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: gridpeek
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: gridpeek
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir staging
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} staging/
          cd staging && 7z a ../gridpeek-${{ matrix.target }}.zip *

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir staging
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} staging/
          cd staging && tar czf ../gridpeek-${{ matrix.target }}.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gridpeek-${{ matrix.target }}
          path: gridpeek-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
